apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tp-perso-crossplane-bootstrap
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tristan7591/idp-wordpress.git
    targetRevision: main
    path: argo-cd/crossplane-bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

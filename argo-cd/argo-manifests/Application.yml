apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tp-perso-crossplane-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tristan7591/idp-wordpress.git
    targetRevision: main
    path: argo-cd/crossplane-resources-manifests/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tp-perso-wordpress
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Tristan7591/idp-wordpress.git
    targetRevision: main
    path: argo-cd/crossplane-resources-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
